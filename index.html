<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFix · Управление поручениями</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --info: #3b82f6;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --menu-bg: #f1f5f9;
            --card-bg: #ffffff;
            --past-meeting: #d1fae5;
            --hover-bg: #e2e8f0;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #10b981;
            --success-hover: #34d399;
            --warning: #f59e0b;
            --info: #60a5fa;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            --menu-bg: #1e293b;
            --card-bg: #1e293b;
            --past-meeting: #064e3b;
            --hover-bg: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
        }

        .menu {
            width: 280px;
            background-color: var(--menu-bg);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            padding-left: 1rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text);
        }

        .menu-item {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .menu-item i {
            width: 1.5rem;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        .menu-item:hover {
            background-color: var(--primary);
            color: white;
        }

        .menu-item:hover i {
            color: white;
        }

        .menu-item.active {
            background-color: var(--primary);
            color: white;
        }

        .menu-item.active i {
            color: white;
        }

        .profile-section {
            margin-top: auto;
            padding: 1rem 1rem 0;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
        }

        .user-edit {
            font-size: 0.8rem;
            color: var(--text-light);
            cursor: pointer;
        }

        .user-edit:hover {
            color: var(--primary);
        }

        .content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        .card {
            background-color: var(--surface);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2 i {
            color: var(--primary);
        }

        h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 1rem;
            color: var(--text);
        }

        .sub-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .sub-tab {
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            background-color: var(--surface);
            border: 1px solid var(--border);
        }

        .sub-tab.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid transparent;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        button.secondary:hover {
            background-color: var(--border);
        }

        button.success {
            background-color: var(--success);
        }

        button.success:hover {
            background-color: var(--success-hover);
        }

        button.danger {
            background-color: var(--danger);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--menu-bg);
            font-weight: 600;
            color: var(--text-light);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .directions-grid, .meeting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .direction-card, .meeting-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .direction-card:hover, .meeting-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .direction-name, .meeting-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .stat-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }

        .stat-done { background-color: var(--success); }
        .stat-progress { background-color: var(--info); }
        .stat-overdue { background-color: var(--danger); }
        .stat-pending { background-color: var(--warning); color: black; }

        .meeting-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .meeting-direction {
            background-color: var(--primary);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            display: inline-block;
        }

        .delete-meeting-btn {
            color: var(--danger);
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
        }

        .delete-meeting-btn:hover {
            color: var(--danger-hover);
        }

        .breadcrumbs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            background: var(--bg);
            padding: 0.5rem 1rem;
            border-radius: 3rem;
        }

        .breadcrumb-item {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: var(--text-light);
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .month-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .month-nav button {
            padding: 0.5rem 1.5rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-day {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.8rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
        }

        .calendar-day.past {
            background-color: var(--past-meeting);
        }

        .day-number {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .day-meeting {
            background-color: var(--primary);
            color: white;
            border-radius: 2rem;
            padding: 0.15rem 0.6rem;
            margin-bottom: 0.2rem;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .meeting-count {
            background-color: white;
            color: black;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .count-zero { background-color: var(--danger); color: white; }
        .count-nonzero { background-color: var(--info); color: white; }

        .config-block {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--bg);
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .file-input {
            display: none;
        }

        .flex-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .mt-2 { margin-top: 1rem; }
        .ml-auto { margin-left: auto; }
        .text-small { font-size: 0.9rem; color: var(--text-light); }

        .direction-list {
            margin: 1.5rem 0;
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
        }

        .direction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--surface);
        }

        .direction-item:last-child {
            border-bottom: none;
        }

        .direction-item button {
            padding: 0.4rem 0.8rem;
            margin-left: 0.5rem;
        }

        .date-header {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.5rem 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .status-select {
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
        }

        /* Дашборд */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .dashboard-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .dashboard-card h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.3rem 0;
            border-bottom: 1px dashed var(--border);
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="logo">Pro<span>Fix</span></div>

        <div class="menu-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Дашборд</span></div>
        <div class="menu-item" data-tab="calendar"><i class="fas fa-calendar-alt"></i><span>Календарь</span></div>
        <div class="menu-item" data-tab="summary"><i class="fas fa-list"></i><span>Свод поручений</span></div>
        <div class="menu-item" data-tab="create-meeting"><i class="fas fa-calendar-plus"></i><span>Заведение встреч</span></div>
        <div class="menu-item" data-tab="backup"><i class="fas fa-database"></i><span>Бэкап</span></div>
        <div class="menu-item" data-tab="settings"><i class="fas fa-cog"></i><span>Настройки</span></div>

        <div class="profile-section" id="profileSection">
            <div class="avatar" id="avatar">U</div>
            <div class="user-info">
                <div class="user-name" id="userNameDisplay">Пользователь</div>
                <div class="user-edit" id="editUserName"><i class="fas fa-pencil-alt"></i> изменить имя</div>
            </div>
        </div>
    </div>

    <div class="content" id="content"></div>

    <script>
        (function() {
            const STORAGE_ASSIGNMENTS = 'assignments';
            const STORAGE_MEETINGS = 'meetings';
            const STORAGE_DIRECTIONS = 'directions';
            const STORAGE_USERS = 'users';
            const STORAGE_STATUSES = 'statuses';
            const STORAGE_STATUS_COLORS = 'statusColors'; // новый
            const STORAGE_USER_NAME = 'userName';
            const STORAGE_THEME = 'theme';

            const defaultDirections = [
                { name: 'Работа', prefix: 'WORK', lastNumber: 0 },
                { name: 'Личное', prefix: 'PERS', lastNumber: 0 },
                { name: 'Учеба', prefix: 'STUDY', lastNumber: 0 },
            ];

            const defaultUsers = ['Иванов', 'Петров', 'Сидорова'];
            const defaultStatuses = ['активно', 'в работе', 'выполнено', 'просрочено'];
            const defaultStatusColors = {
                'активно': '#f59e0b',
                'в работе': '#3b82f6',
                'выполнено': '#10b981',
                'просрочено': '#ef4444'
            };

            const defaultMeetings = [
                { id: 'm1', title: 'Еженедельная планерка', description: 'Обсуждение текущих задач', date: new Date().toISOString().split('T')[0], direction: 'Работа' },
                { id: 'm2', title: 'Защита проекта', description: 'Демо заказчику', date: new Date().toISOString().split('T')[0], direction: 'Учеба' },
            ];

            function loadDirections() {
                const data = localStorage.getItem(STORAGE_DIRECTIONS);
                if (data) {
                    try {
                        const parsed = JSON.parse(data);
                        if (Array.isArray(parsed) && parsed.length && typeof parsed[0] === 'string') {
                            const newDirs = parsed.map((name, i) => ({
                                name, prefix: name.slice(0,4).toUpperCase() + i, lastNumber: 0
                            }));
                            localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(newDirs));
                            return newDirs;
                        }
                        return parsed;
                    } catch { return defaultDirections; }
                }
                localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(defaultDirections));
                return defaultDirections;
            }

            function loadUsers() {
                const data = localStorage.getItem(STORAGE_USERS);
                if (data) {
                    try { return JSON.parse(data); } catch { return defaultUsers; }
                }
                localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
                return defaultUsers;
            }

            function loadStatuses() {
                const data = localStorage.getItem(STORAGE_STATUSES);
                if (data) {
                    try { return JSON.parse(data); } catch { return defaultStatuses; }
                }
                localStorage.setItem(STORAGE_STATUSES, JSON.stringify(defaultStatuses));
                return defaultStatuses;
            }

            function loadStatusColors() {
                const data = localStorage.getItem(STORAGE_STATUS_COLORS);
                if (data) {
                    try { return JSON.parse(data); } catch { return defaultStatusColors; }
                }
                localStorage.setItem(STORAGE_STATUS_COLORS, JSON.stringify(defaultStatusColors));
                return defaultStatusColors;
            }

            function loadMeetings() {
                const data = localStorage.getItem(STORAGE_MEETINGS);
                if (data) {
                    try { return JSON.parse(data); } catch { return defaultMeetings; }
                }
                localStorage.setItem(STORAGE_MEETINGS, JSON.stringify(defaultMeetings));
                return defaultMeetings;
            }

            function loadAssignments() {
                const data = localStorage.getItem(STORAGE_ASSIGNMENTS);
                if (data) {
                    try { return JSON.parse(data); } catch { return []; }
                }
                return [];
            }

            function loadUserName() {
                return localStorage.getItem(STORAGE_USER_NAME) || 'Пользователь';
            }

            function saveDirections(d) { localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(d)); }
            function saveUsers(u) { localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
            function saveStatuses(s) { localStorage.setItem(STORAGE_STATUSES, JSON.stringify(s)); }
            function saveStatusColors(c) { localStorage.setItem(STORAGE_STATUS_COLORS, JSON.stringify(c)); }
            function saveMeetings(m) { localStorage.setItem(STORAGE_MEETINGS, JSON.stringify(m)); }
            function saveAssignments(a) { localStorage.setItem(STORAGE_ASSIGNMENTS, JSON.stringify(a)); }
            function saveUserName(n) { localStorage.setItem(STORAGE_USER_NAME, n); }

            function loadTheme() { return localStorage.getItem(STORAGE_THEME) || 'light'; }
            function saveTheme(t) { localStorage.setItem(STORAGE_THEME, t); }
            function applyTheme(theme) {
                if (theme === 'dark') document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }

            let currentTheme = loadTheme();
            applyTheme(currentTheme);

            let directions = loadDirections();
            let users = loadUsers();
            let statuses = loadStatuses();
            let statusColors = loadStatusColors();
            let meetings = loadMeetings();
            let assignments = loadAssignments();
            let userName = loadUserName();

            function updateProfileUI() {
                document.getElementById('userNameDisplay').innerText = userName;
                const avatar = document.getElementById('avatar');
                avatar.innerText = userName.charAt(0).toUpperCase();
            }

            document.getElementById('editUserName').addEventListener('click', () => {
                const newName = prompt('Введите ваше имя:', userName);
                if (newName && newName.trim()) {
                    userName = newName.trim();
                    saveUserName(userName);
                    updateProfileUI();
                }
            });

            function generateAssignmentId(directionName) {
                const dir = directions.find(d => d.name === directionName);
                if (!dir) return 'UNKNOWN_00000';
                const nextNum = (dir.lastNumber || 0) + 1;
                return `${dir.prefix}_${String(nextNum).padStart(5, '0')}`;
            }

            function incrementDirectionCounter(directionName) {
                const dir = directions.find(d => d.name === directionName);
                if (dir) {
                    dir.lastNumber = (dir.lastNumber || 0) + 1;
                    saveDirections(directions);
                }
            }

            function groupMeetingsByDate() {
                const groups = {};
                meetings.forEach(m => {
                    if (!groups[m.date]) groups[m.date] = [];
                    groups[m.date].push(m);
                });
                return groups;
            }

            function getDirectionStats(directionName) {
                const dirAssignments = assignments.filter(a => a.direction === directionName);
                const stats = {};
                statuses.forEach(s => stats[s] = 0);
                dirAssignments.forEach(a => stats[a.status] = (stats[a.status] || 0) + 1);
                return stats;
            }

            // ========== ДАШБОРД ==========
            function renderDashboardTab() {
                // Общая статистика
                const totalAssignments = assignments.length;
                const totalMeetings = meetings.length;
                const completed = assignments.filter(a => a.status === 'выполнено').length;

                // Статистика по направлениям
                const dirStats = directions.map(d => {
                    const stats = getDirectionStats(d.name);
                    return { name: d.name, ...stats };
                });

                // Статистика по ответственным
                const respStats = {};
                assignments.forEach(a => {
                    if (!respStats[a.responsible]) respStats[a.responsible] = {};
                    respStats[a.responsible][a.status] = (respStats[a.responsible][a.status] || 0) + 1;
                });

                let html = `
                    <div class="card">
                        <h2><i class="fas fa-chart-pie"></i> Дашборд</h2>
                        <div class="dashboard-grid">
                            <div class="dashboard-card">
                                <h3>Общая статистика</h3>
                                <div class="stat-row"><span>Всего поручений:</span> <strong>${totalAssignments}</strong></div>
                                <div class="stat-row"><span>Всего встреч:</span> <strong>${totalMeetings}</strong></div>

            // ========== КАЛЕНДАРЬ ==========
            function renderCalendarTab() {
                const now = new Date();
                let currentMonth = now.getMonth();
                let currentYear = now.getFullYear();

                function buildCalendar(month, year) {
                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);
                    const daysInMonth = lastDay.getDate();
                    const startWeekday = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;

                    const days = [];
                    for (let i = 0; i < startWeekday; i++) days.push(null);

                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const dayMeetings = meetings.filter(m => m.date === dateStr);
                        const isPast = new Date(dateStr) < new Date(new Date().toDateString());
                        days.push({ date: dateStr, meetings: dayMeetings, past: isPast });
                    }
                    return days;
                }

                function renderMonth() {
                    const days = buildCalendar(currentMonth, currentYear);
                    const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
                    const weekdays = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

                    let html = `
                        <div class="card">
                            <div class="calendar-header">
                                <h2><i class="fas fa-calendar-alt"></i> Календарь</h2>
                                <div class="month-nav">
                                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                                    <span style="font-size:1.5rem; font-weight:600;">${monthNames[currentMonth]} ${currentYear}</span>
                                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                                </div>
                            </div>
                            <div class="calendar-grid">
                                ${weekdays.map(d => `<div style="font-weight:600; text-align:center;">${d}</div>`).join('')}
                                ${days.map(day => {
                                    if (!day) return '<div class="calendar-day" style="background:transparent; border:none;"></div>';
                                    const meetingElements = day.meetings.map(m => {
                                        const assignCount = assignments.filter(a => a.meetingId === m.id).length;
                                        const countClass = assignCount === 0 ? 'count-zero' : 'count-nonzero';
                                        return `<div class="day-meeting" onclick="window.openMeetingAssignments('${m.id}')">
                                            ${m.title} <span class="meeting-count ${countClass}">${assignCount}</span>
                                        </div>`;
                                    }).join('');
                                    return `<div class="calendar-day ${day.past ? 'past' : ''}">
                                        <div class="day-number">${day.date.split('-')[2]}</div>
                                        ${meetingElements}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    document.getElementById('content').innerHTML = html;

                    document.getElementById('prevMonth').addEventListener('click', () => {
                        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
                        else currentMonth--;
                        renderMonth();
                    });
                    document.getElementById('nextMonth').addEventListener('click', () => {
                        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
                        else currentMonth++;
                        renderMonth();
                    });
                }
                renderMonth();
            }

                        btn.addEventListener('click', (e) => {
                            const idx = e.target.closest('button').dataset.index;
                            if (directions.length <= 1) { alert('Должно быть хотя бы одно'); return; }
                            directions.splice(idx, 1);
                            saveDirections(directions);
                            renderSettingsContent();
                        });
                    });
                    document.querySelectorAll('.edit-dir').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = e.target.closest('button').dataset.index;
                            const dir = directions[idx];
                            const newName = prompt('Название:', dir.name);
                            if (newName && newName !== dir.name) {
                                if (directions.some(d => d.name === newName)) { alert('Уже есть'); return; }
                                dir.name = newName;
                            }
                            const newPrefix = prompt('Префикс:', dir.prefix);
                            if (newPrefix) {
                                const clean = newPrefix.toUpperCase().replace(/[^A-Z0-9]/g, '');
                                if (clean && clean !== dir.prefix) {
                                    if (directions.some(d => d.prefix === clean)) { alert('Префикс уже есть'); return; }
                                    dir.prefix = clean;
                                }
                            }
                            saveDirections(directions);
                            renderSettingsContent();
                        });
                    });
                } else if (settingsTab === 'users') {
                    let html = `
                        <h3>Ответственные лица</h3>
                        <div class="flex-row" style="margin-bottom:1rem;">
                            <input type="text" id="newUserName" placeholder="Новый пользователь">
                            <button id="addUserBtn"><i class="fas fa-plus"></i> Добавить</button>
                        </div>
                        <div class="direction-list">
                            ${users.map((u, idx) => `
                                <div class="direction-item">
                                    <span>${u}</span>
                                    <button class="danger delete-user" data-index="${idx}"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.innerHTML = html;
                    document.getElementById('addUserBtn').addEventListener('click', () => {
                        const name = document.getElementById('newUserName').value.trim();
                        if (!name) return;
                        if (users.includes(name)) { alert('Уже есть'); return; }
                        users.push(name);
                        saveUsers(users);
                        renderSettingsContent();
                    });
                    document.querySelectorAll('.delete-user').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = e.target.closest('button').dataset.index;
                            if (users.length <= 1) { alert('Должен быть хотя бы один'); return; }
                            users.splice(idx, 1);
                            saveUsers(users);
                            renderSettingsContent();
                        });
                    });
                } else if (settingsTab === 'statuses') {
                    let html = `
                        <h3>Статусы поручений</h3>
                        <div style="margin-bottom:1rem;">
                            ${statuses.map((s, idx) => `
                                <div class="flex-row" style="margin-bottom:0.5rem;">
                                    <input type="text" value="${s}" placeholder="Статус" id="statusName_${idx}" style="flex:1;">
                                    <input type="color" value="${statusColors[s] || '#cccccc'}" id="statusColor_${idx}">
                                    <button class="danger delete-status" data-index="${idx}"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex-row">
                            <input type="text" id="newStatusName" placeholder="Новый статус">
                            <input type="color" id="newStatusColor" value="#3b82f6">
                            <button id="addStatusBtn"><i class="fas fa-plus"></i> Добавить</button>
                        </div>
                        <button id="saveStatusColors" class="success" style="margin-top:1rem;">Сохранить изменения</button>
                    `;
                    container.innerHTML = html;

                    document.getElementById('saveStatusColors').addEventListener('click', () => {
                        const newStatuses = [];
                        const newColors = {};
                        statuses.forEach((_, idx) => {
                            const nameInput = document.getElementById(`statusName_${idx}`);
                            const colorInput = document.getElementById(`statusColor_${idx}`);
                            if (nameInput && nameInput.value.trim()) {
                                const name = nameInput.value.trim();
                                newStatuses.push(name);
                                newColors[name] = colorInput.value;
                            }
                        });
                        if (newStatuses.length) {
                            statuses = newStatuses;
                            statusColors = newColors;
                            saveStatuses(statuses);
                            saveStatusColors(statusColors);
                            alert('Статусы и цвета сохранены');
                        }
                    });

                    document.getElementById('addStatusBtn').addEventListener('click', () => {
                        const name = document.getElementById('newStatusName').value.trim();
                        const color = document.getElementById('newStatusColor').value;
                        if (!name) return;
                        if (statuses.includes(name)) { alert('Такой статус уже есть'); return; }
                        statuses.push(name);
                        statusColors[name] = color;
                        saveStatuses(statuses);
                        saveStatusColors(statusColors);
                        renderSettingsContent();
                    });

                    document.querySelectorAll('.delete-status').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = e.target.closest('button').dataset.index;
                            const statusToRemove = statuses[idx];
                            if (statuses.length <= 1) { alert('Должен быть хотя бы один статус'); return; }
                            statuses.splice(idx, 1);
                            delete statusColors[statusToRemove];
                            saveStatuses(statuses);
                            saveStatusColors(statusColors);
                            renderSettingsContent();
                        });
                    });
                } else if (settingsTab === 'site') {
                    let html = `
                        <h3>Оформление</h3>
                        <div class="form-group">
                            <label>Тема сайта</label>
                            <select id="themeSelect">
                                <option value="light" ${currentTheme==='light'?'selected':''}>Светлая</option>
                                <option value="dark" ${currentTheme==='dark'?'selected':''}>Тёмная</option>
                            </select>
                        </div>
                        <button id="applyThemeBtn">Применить</button>
                    `;
                    container.innerHTML = html;
                    document.getElementById('applyThemeBtn').addEventListener('click', () => {
                        const newTheme = document.getElementById('themeSelect').value;
                        currentTheme = newTheme;
                        applyTheme(newTheme);
                        saveTheme(newTheme);
                    });
                }
            }

            // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК МЕНЮ ==========
            const tabs = {
                dashboard: renderDashboardTab,
                calendar: renderCalendarTab,
                summary: renderSummaryTab,
                'create-meeting': renderCreateMeetingTab,
                backup: renderBackupTab,
                settings: renderSettingsTab
            };

            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const tab = item.dataset.tab;
                    tabs[tab]();
                });
            });

            renderDashboardTab();
            updateProfileUI();
        })();
    </script>
</body>
</html>
