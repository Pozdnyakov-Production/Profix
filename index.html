<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ProFix · Управление поручениями</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- ТЕМЫ ----- */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --info: #3b82f6;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --menu-bg: #f1f5f9;
            --card-bg: #ffffff;
            --past-meeting: #d1fae5;
            --hover-bg: #e2e8f0;
        }
        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #10b981;
            --success-hover: #34d399;
            --warning: #f59e0b;
            --info: #60a5fa;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            --menu-bg: #1e293b;
            --card-bg: #1e293b;
            --past-meeting: #064e3b;
            --hover-bg: #334155;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---------- МЕНЮ ---------- */
        .menu {
            width: 280px;
            background-color: var(--menu-bg);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--shadow);
            z-index: 1000;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            padding-left: 1rem;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--text); }
        .menu-item {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item i {
            width: 1.5rem;
            font-size: 1.2rem;
            color: var(--text-light);
        }
        .menu-item:hover {
            background-color: var(--primary);
            color: white;
        }
        .menu-item:hover i { color: white; }
        .menu-item.active {
            background-color: var(--primary);
            color: white;
        }
        .menu-item.active i { color: white; }
        .profile-section {
            margin-top: auto;
            padding: 1rem 1rem 0;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; }
        .user-edit {
            font-size: 0.8rem;
            color: var(--text-light);
            cursor: pointer;
        }
        .user-edit:hover { color: var(--primary); }

        /* ---------- БУРГЕР И АДАПТИВ ---------- */
        .burger {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1002;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            cursor: pointer;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 999;
        }
        @media (max-width: 768px) {
            .burger { display: flex; }
            .menu {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 1001;
            }
            .menu.open { transform: translateX(0); }
            .overlay.active { display: block; }
            .content {
                margin-left: 0;
                width: 100%;
                padding: 1rem;
                margin-top: 70px;
            }
        }
        @media (min-width: 769px) {
            .menu { transform: translateX(0); }
            .content { padding: 2rem 3rem; }
        }

        /* ---------- ОБЩИЕ СТИЛИ ---------- */
        .content { flex: 1; overflow-y: auto; transition: padding 0.3s; }
        .card {
            background-color: var(--surface);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        h2 i { color: var(--primary); }
        h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 1rem;
            color: var(--text);
        }
        .sub-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .sub-tab {
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            background-color: var(--surface);
            border: 1px solid var(--border);
        }
        .sub-tab.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        button.secondary:hover { background-color: var(--border); }
        button.success {
            background-color: var(--success);
        }
        button.success:hover { background-color: var(--success-hover); }
        button.danger { background-color: var(--danger); }
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-top: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface);
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: var(--menu-bg);
            font-weight: 600;
            color: var(--text-light);
        }
        .directions-grid, .meeting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .direction-card, .meeting-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }
        .direction-card:hover, .meeting-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        .direction-name, .meeting-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .stat-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }
        .meeting-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .meeting-direction {
            background-color: var(--primary);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            display: inline-block;
        }
        .delete-meeting-btn {
            color: var(--danger);
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
        }
        .delete-meeting-btn:hover { color: var(--danger-hover); }
        .breadcrumbs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            background: var(--bg);
            padding: 0.5rem 1rem;
            border-radius: 3rem;
        }
        .breadcrumb-item {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
        }
        .breadcrumb-item:hover { text-decoration: underline; }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .month-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }
        .calendar-day {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.8rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
        }
        .calendar-day.past { background-color: var(--past-meeting); }
        .day-number { font-weight: 600; margin-bottom: 0.3rem; }
        .day-meeting {
            background-color: var(--primary);
            color: white;
            border-radius: 2rem;
            padding: 0.15rem 0.6rem;
            margin-bottom: 0.2rem;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .meeting-count {
            background-color: white;
            color: black;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .count-zero { background-color: var(--danger); color: white; }
        .count-nonzero { background-color: var(--info); color: white; }
        .config-block {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--bg);
            border-radius: 1rem;
            border: 1px solid var(--border);
        }
        .file-input { display: none; }
        .flex-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .text-small { font-size: 0.9rem; color: var(--text-light); }
        .direction-list {
            margin: 1.5rem 0;
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
        }
        .direction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--surface);
        }
        .direction-item:last-child { border-bottom: none; }
        .date-header {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.5rem 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 1rem;
            color: var(--primary);
        }
        .status-select {
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
        }
        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: repeat(7, minmax(40px, 1fr));
                gap: 0.25rem;
            }
            .calendar-day { min-height: 80px; padding: 0.4rem; }
            .day-meeting { font-size: 0.65rem; }
            .card { padding: 1rem; }
            h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <button class="burger" id="burgerBtn"><i class="fas fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>

    <div class="menu" id="menu">
        <div class="logo">Pro<span>Fix</span></div>
        <div class="menu-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Дашборд</span></div>
        <div class="menu-item" data-tab="calendar"><i class="fas fa-calendar-alt"></i><span>Календарь</span></div>
        <div class="menu-item" data-tab="summary"><i class="fas fa-list"></i><span>Свод поручений</span></div>
        <div class="menu-item" data-tab="create-meeting"><i class="fas fa-calendar-plus"></i><span>Заведение встреч</span></div>
        <div class="menu-item" data-tab="backup"><i class="fas fa-database"></i><span>Бэкап</span></div>
        <div class="menu-item" data-tab="settings"><i class="fas fa-cog"></i><span>Настройки</span></div>
        <div class="profile-section">
            <div class="avatar" id="avatar">U</div>
            <div class="user-info">
                <div class="user-name" id="userNameDisplay">Пользователь</div>
                <div class="user-edit" id="editUserName"><i class="fas fa-pencil-alt"></i> изменить имя</div>
            </div>
        </div>
    </div>

    <div class="content" id="content"></div>

    <script>
        // ==================== ХРАНИЛИЩА ====================
        const STORAGE_ASSIGNMENTS = 'assignments';
        const STORAGE_MEETINGS = 'meetings';
        const STORAGE_DIRECTIONS = 'directions';
        const STORAGE_USERS = 'users';
        const STORAGE_STATUSES = 'statuses';
        const STORAGE_STATUS_COLORS = 'statusColors';
        const STORAGE_USER_NAME = 'userName';
        const STORAGE_THEME = 'theme';

        // Начальные данные
        const defaultDirections = [
            { name: 'Работа', prefix: 'WORK', lastNumber: 0 },
            { name: 'Личное', prefix: 'PERS', lastNumber: 0 },
            { name: 'Учеба', prefix: 'STUDY', lastNumber: 0 },
        ];
        const defaultUsers = ['Иванов', 'Петров', 'Сидорова'];
        const defaultStatuses = ['активно', 'в работе', 'выполнено', 'просрочено'];
        const defaultStatusColors = {
            'активно': '#f59e0b',
            'в работе': '#3b82f6',
            'выполнено': '#10b981',
            'просрочено': '#ef4444'
        };
        const defaultMeetings = [
            { id: 'm1', title: 'Еженедельная планерка', date: new Date().toISOString().split('T')[0], direction: 'Работа', description: 'Обсуждение текущих задач' },
            { id: 'm2', title: 'Защита проекта', date: new Date().toISOString().split('T')[0], direction: 'Учеба', description: 'Защита дипломного проекта' },
        ];

        // Загрузка
        function loadDirections() {
            const data = localStorage.getItem(STORAGE_DIRECTIONS);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (Array.isArray(parsed) && parsed.length && typeof parsed[0] === 'string') {
                        const newDirs = parsed.map((name, i) => ({ name, prefix: name.slice(0,4).toUpperCase() + i, lastNumber: 0 }));
                        localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(newDirs));
                        return newDirs;
                    }
                    return parsed;
                } catch { return defaultDirections; }
            }
            localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(defaultDirections));
            return defaultDirections;
        }
        function loadUsers() {
            const data = localStorage.getItem(STORAGE_USERS);
            if (data) { try { return JSON.parse(data); } catch { return defaultUsers; } }
            localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        function loadStatuses() {
            const data = localStorage.getItem(STORAGE_STATUSES);
            if (data) { try { return JSON.parse(data); } catch { return defaultStatuses; } }
            localStorage.setItem(STORAGE_STATUSES, JSON.stringify(defaultStatuses));
            return defaultStatuses;
        }
        function loadStatusColors() {
            const data = localStorage.getItem(STORAGE_STATUS_COLORS);
            if (data) { try { return JSON.parse(data); } catch { return defaultStatusColors; } }
            localStorage.setItem(STORAGE_STATUS_COLORS, JSON.stringify(defaultStatusColors));
            return defaultStatusColors;
        }
        function loadMeetings() {
            const data = localStorage.getItem(STORAGE_MEETINGS);
            if (data) { try { return JSON.parse(data); } catch { return defaultMeetings; } }
            localStorage.setItem(STORAGE_MEETINGS, JSON.stringify(defaultMeetings));
            return defaultMeetings;
        }
        function loadAssignments() {
            const data = localStorage.getItem(STORAGE_ASSIGNMENTS);
            if (data) { try { return JSON.parse(data); } catch { return []; } }
            return [];
        }
        function loadUserName() {
            return localStorage.getItem(STORAGE_USER_NAME) || 'Пользователь';
        }
        function saveDirections(d) { localStorage.setItem(STORAGE_DIRECTIONS, JSON.stringify(d)); }
        function saveUsers(u) { localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
        function saveStatuses(s) { localStorage.setItem(STORAGE_STATUSES, JSON.stringify(s)); }
        function saveStatusColors(c) { localStorage.setItem(STORAGE_STATUS_COLORS, JSON.stringify(c)); }
        function saveMeetings(m) { localStorage.setItem(STORAGE_MEETINGS, JSON.stringify(m)); }
        function saveAssignments(a) { localStorage.setItem(STORAGE_ASSIGNMENTS, JSON.stringify(a)); }
        function saveUserName(n) { localStorage.setItem(STORAGE_USER_NAME, n); }

        // Тема
        function loadTheme() { return localStorage.getItem(STORAGE_THEME) || 'light'; }
        function saveTheme(t) { localStorage.setItem(STORAGE_THEME, t); }
        function applyTheme(theme) {
            if (theme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
        }

        let currentTheme = loadTheme();
        applyTheme(currentTheme);

        let directions = loadDirections();
        let users = loadUsers();
        let statuses = loadStatuses();
        let statusColors = loadStatusColors();
        let meetings = loadMeetings();
        let assignments = loadAssignments();
        let userName = loadUserName();

        // Вспомогательные функции
        function updateProfileUI() {
            document.getElementById('userNameDisplay').innerText = userName;
            document.getElementById('avatar').innerText = userName.charAt(0).toUpperCase();
        }
        document.getElementById('editUserName').addEventListener('click', () => {
            const newName = prompt('Введите ваше имя:', userName);
            if (newName && newName.trim()) {
                userName = newName.trim();
                saveUserName(userName);
                updateProfileUI();
            }
        });

        function generateAssignmentId(directionName) {
            const dir = directions.find(d => d.name === directionName);
            if (!dir) return 'UNKNOWN_00000';
            const nextNum = (dir.lastNumber || 0) + 1;
            return `${dir.prefix}_${String(nextNum).padStart(5, '0')}`;
        }
        function incrementDirectionCounter(directionName) {
            const dir = directions.find(d => d.name === directionName);
            if (dir) {
                dir.lastNumber = (dir.lastNumber || 0) + 1;
                saveDirections(directions);
            }
        }
        function groupMeetingsByDate() {
            const groups = {};
            meetings.forEach(m => { if (!groups[m.date]) groups[m.date] = []; groups[m.date].push(m); });
            return groups;
        }
        function getDirectionStats(directionName) {
            const dirAssignments = assignments.filter(a => a.direction === directionName);
            return {
                выполнено: dirAssignments.filter(a => a.status === 'выполнено').length,
                'в работе': dirAssignments.filter(a => a.status === 'в работе').length,
                просрочено: dirAssignments.filter(a => a.status === 'просрочено').length,
                активно: dirAssignments.filter(a => a.status === 'активно').length,
            };
        }
        function exportAssignmentsToCSV(assigns) {
            if (!assigns || assigns.length === 0) { alert('Нет данных'); return; }
            const keys = Object.keys(assigns[0]);
            const header = keys.join(';');
            const rows = assigns.map(a => keys.map(k => a[k]).join(';')).join('\n');
            const content = header + '\n' + rows;
            const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'assignments.csv';
            link.click();
        }

        // ========== ДАШБОРД ==========
        function renderDashboard() {
            const total = assignments.length;
            const completed = assignments.filter(a => a.status === 'выполнено').length;
            const inProgress = assignments.filter(a => a.status === 'в работе').length;
            const overdue = assignments.filter(a => a.status === 'просрочено').length;

        // ========== КАЛЕНДАРЬ ==========
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        function renderCalendar() {
            function buildCalendar(month, year) {
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month+1, 0);
                const daysInMonth = lastDay.getDate();
                const startWeekday = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
                const days = [];
                for (let i=0; i<startWeekday; i++) days.push(null);
                for (let d=1; d<=daysInMonth; d++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayMeetings = meetings.filter(m => m.date === dateStr);
                    const isPast = new Date(dateStr) < new Date(new Date().toDateString());
                    days.push({ date: dateStr, meetings: dayMeetings, past: isPast });
                }
                return days;
            }
            function render() {
                const days = buildCalendar(currentMonth, currentYear);
                const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
                const weekdays = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
                let html = `
                    <div class="card">
                        <div class="calendar-header">
                            <h2><i class="fas fa-calendar-alt"></i> Календарь</h2>
                            <div class="month-nav">
                                <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                                <span style="font-size:1.5rem;font-weight:600;">${monthNames[currentMonth]} ${currentYear}</span>
                                <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="calendar-grid">
                            ${weekdays.map(d => `<div style="font-weight:600;text-align:center;">${d}</div>`).join('')}
                            ${days.map(day => {
                                if (!day) return '<div class="calendar-day" style="background:transparent;border:none;"></div>';
                                const meetingElements = day.meetings.map(m => {
                                    const count = assignments.filter(a => a.meetingId === m.id).length;
                                    const countClass = count===0 ? 'count-zero' : 'count-nonzero';
                                    return `<div class="day-meeting" onclick="window.openMeetingAssignments('${m.id}')">
                                        ${m.title} <span class="meeting-count ${countClass}">${count}</span>
                                    </div>`;
                                }).join('');
                                return `<div class="calendar-day ${day.past ? 'past' : ''}">
                                    <div class="day-number">${day.date.split('-')[2]}</div>
                                    ${meetingElements}
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
                document.getElementById('content').innerHTML = html;
                document.getElementById('prevMonth')?.addEventListener('click', () => {
                    if (currentMonth===0) { currentMonth=11; currentYear--; } else currentMonth--;
                    render();
                });
                document.getElementById('nextMonth')?.addEventListener('click', () => {
                    if (currentMonth===11) { currentMonth=0; currentYear++; } else currentMonth++;
                    render();
                });
            }
            render();
        }

                            d.name = newName;
                        }
                        const newPrefix = prompt('Префикс:', d.prefix);
                        if (newPrefix) {
                            const clean = newPrefix.toUpperCase().replace(/[^A-Z0-9]/g,'');
                            if (clean && clean!==d.prefix) {
                                if (directions.some(dd=>dd.prefix===clean)) { alert('Префикс уже есть'); return; }
                                d.prefix = clean;
                            }
                        }
                        saveDirections(directions);
                        renderSettingsContent();
                    });
                });
            } else if (settingsTab === 'users') {
                let html = `<h3>Ответственные</h3><div class="flex-row" style="margin-bottom:1rem;"><input id="newUserName" placeholder="Новый пользователь"><button id="addUserBtn">Добавить</button></div><div class="direction-list">`;
                users.forEach((u,i) => {
                    html += `<div class="direction-item"><span>${u}</span><button class="danger delete-user" data-index="${i}"><i class="fas fa-trash"></i></button></div>`;
                });
                html += `</div>`;
                container.innerHTML = html;
                document.getElementById('addUserBtn').addEventListener('click', () => {
                    const name = document.getElementById('newUserName').value.trim();
                    if (!name) return;
                    if (users.includes(name)) { alert('Уже есть'); return; }
                    users.push(name);
                    saveUsers(users);
                    renderSettingsContent();
                });
                document.querySelectorAll('.delete-user').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = btn.dataset.index;
                        if (users.length<=1) { alert('Должен быть хотя бы один'); return; }
                        users.splice(idx,1);
                        saveUsers(users);
                        renderSettingsContent();
                    });
                });
            } else if (settingsTab === 'statuses') {
                let html = `<h3>Статусы и цвета</h3><div class="flex-row" style="margin-bottom:1rem;"><input id="newStatus" placeholder="Новый статус"><input type="color" id="newStatusColor" value="#3b82f6"><button id="addStatusBtn">Добавить</button></div><div class="direction-list">`;
                for (let [s, color] of Object.entries(statusColors)) {
                    html += `<div class="direction-item"><span style="display:flex;align-items:center;gap:0.5rem;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background-color:${color};"></span>${s}</span><div><button class="secondary edit-status" data-status="${s}"><i class="fas fa-edit"></i></button><button class="danger delete-status" data-status="${s}"><i class="fas fa-trash"></i></button></div></div>`;
                }
                html += `</div>`;
                container.innerHTML = html;
                document.getElementById('addStatusBtn').addEventListener('click', () => {
                    const st = document.getElementById('newStatus').value.trim();
                    const col = document.getElementById('newStatusColor').value;
                    if (!st) return;
                    if (statusColors[st]) { alert('Статус уже есть'); return; }
                    statusColors[st] = col;
                    if (!statuses.includes(st)) statuses.push(st);
                    saveStatuses(statuses);
                    saveStatusColors(statusColors);
                    renderSettingsContent();
                });
                document.querySelectorAll('.delete-status').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const st = btn.dataset.status;
                        if (statuses.length<=1) { alert('Должен быть хотя бы один статус'); return; }
                        delete statusColors[st];
                        const idx = statuses.indexOf(st);
                        if (idx!==-1) statuses.splice(idx,1);
                        saveStatuses(statuses);
                        saveStatusColors(statusColors);
                        renderSettingsContent();
                    });
                });
                document.querySelectorAll('.edit-status').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const oldStatus = btn.dataset.status;
                        const newName = prompt('Новое название статуса:', oldStatus);
                        if (newName && newName!==oldStatus) {
                            if (statusColors[newName]) { alert('Уже есть'); return; }
                            statusColors[newName] = statusColors[oldStatus];
                            delete statusColors[oldStatus];
                            const idx = statuses.indexOf(oldStatus);
                            if (idx!==-1) statuses[idx] = newName;
                            saveStatuses(statuses);
                            saveStatusColors(statusColors);
                            renderSettingsContent();
                        }
                        const newColor = prompt('Новый цвет (hex):', statusColors[oldStatus]);
                        if (newColor && /^#[0-9A-F]{6}$/i.test(newColor)) {
                            statusColors[oldStatus] = newColor;
                            saveStatusColors(statusColors);
                            renderSettingsContent();
                        }
                    });
                });
            } else if (settingsTab === 'site') {
                container.innerHTML = `
                    <h3>Оформление</h3>
                    <div class="form-group"><label>Тема сайта</label><select id="themeSelect"><option value="light" ${currentTheme==='light'?'selected':''}>Светлая</option><option value="dark" ${currentTheme==='dark'?'selected':''}>Тёмная</option></select></div>
                    <button id="applyThemeBtn">Применить</button>
                `;
                document.getElementById('applyThemeBtn').addEventListener('click', () => {
                    const newTheme = document.getElementById('themeSelect').value;
                    currentTheme = newTheme;
                    applyTheme(newTheme);
                    saveTheme(newTheme);
                });
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК МЕНЮ ==========
        const tabs = {
            dashboard: renderDashboard,
            calendar: renderCalendar,
            summary: renderSummaryTab,
            'create-meeting': renderCreateMeetingTab,
            backup: renderBackupTab,
            settings: renderSettingsTab
        };
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
                item.classList.add('active');
                const tab = item.dataset.tab;
                tabs[tab]();
                if (window.innerWidth <= 768) {
                    document.getElementById('menu').classList.remove('open');
                    document.getElementById('overlay').classList.remove('active');
                    document.getElementById('burgerBtn').innerHTML = '<i class="fas fa-bars"></i>';
                }
            });
        });

        // Бургер-меню
        const burgerBtn = document.getElementById('burgerBtn');
        const menu = document.getElementById('menu');
        const overlay = document.getElementById('overlay');
        function toggleMenu() {
            menu.classList.toggle('open');
            overlay.classList.toggle('active');
            burgerBtn.innerHTML = menu.classList.contains('open') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        }
        burgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // Инициализация
        renderDashboard();
        updateProfileUI();
    </script>
</body>
</html>
